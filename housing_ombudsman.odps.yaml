apiVersion: v1.0.0
kind: DataProduct
id: 4945c4a1-531f-4c11-9be2-928169b487b3
version: 1.0.0
status: draft
name: housing-ombudsman-decisions
domain: housing-regulation
tenant: OpenDataContractStandard
productCreatedTs: "2026-06-24T00:00:00Z"

tags:
  - housing
  - ombudsman
  - uk
  - social-housing
  - regulatory-decisions
  - llm-extracted

description:
  purpose: >
    Structured, machine-readable records of published decisions by the UK
    Housing Ombudsman Service. Covers formal complaints brought by social
    housing residents against registered landlords and local authorities in
    England after exhaustion of the landlord's internal complaints process.
    Enables analysis of landlord performance, determination patterns,
    compensation awards, complaint-handling timescales, and policy compliance
    across the social housing sector.
  limitations: >
    All columns with an '_est' suffix are LLM-estimated values extracted from
    free-text decision PDFs and should be treated as estimates, not ground
    truth. Extraction fidelity is lower for cases in the legacy 'old'
    doc_format (pre-2020 Report style). Landlord type and tenancy type values
    are not normalised — raw extracted strings may vary. Compensation amounts
    are in GBP. Jurisdiction is England only; the Housing Ombudsman does not
    cover Scotland, Wales, or Northern Ireland. While residents are not named
    in published decisions, the full_text field reproduces verbatim decision
    text and is classified restricted in the accompanying data contract.
  usage: >
    Suitable for landlord benchmarking, policy compliance analysis,
    compensation trend modelling, and as a training or evaluation dataset for
    NLP and LLM systems operating in the social housing regulatory domain.
    Analysts should join cases → issues for issue-level determination analysis,
    and cases → compensation_orders for monetary remedy analysis. The
    full_text column in cases is the authoritative source and should be used
    to verify any _est field.

authoritativeDefinitions:
  - type: terms_and_conditions
    url: "https://www.housing-ombudsman.org.uk/about-us/terms-and-conditions/"
  - type: specification
    url: "https://bitol-io.github.io/open-data-product-standard/"
  - type: data_contract
    url: "https://github.com/guyclarkemarshall/HousingOmbudsmanData/blob/main/housing_ombudsman.odcs.yaml"

inputPorts:
  - name: housing-ombudsman-website
    version: "1.0.0"
    contractId: 00000000-0000-0000-0000-000000000000
    tags:
      - scraping
      - web
    customProperties:
      - property: sourceUrl
        value: "https://www.housing-ombudsman.org.uk/decisions/"
        description: >
          The Housing Ombudsman's public decisions search page. Decisions are
          published as HTML/PDF on a rolling basis, typically within days of
          signing.
      - property: scrapeFrequency
        value: daily
        description: >
          Recommended scrape cadence to capture new publications without
          significant lag.
      - property: scraperScript
        value: scraper.py
        description: >
          Python script that fetches decision URLs, downloads full text, and
          populates ombudsman_decisions.db.

outputPorts:
  - name: ombudsman-insights-sqlite
    version: "1.0.0"
    contractId: 496f1c72-b8f3-4158-9090-3e1bef5e438e
    type: tables
    inputContracts:
      - id: ombudsman-decisions-raw-v1
        version: "1.0.0"
    description: >
      Structured SQLite database (ombudsman_insights.db) containing five
      relational tables: landlords, cases, issues, compensation_orders, and
      legal_citations. Cases are linked to child tables via case_id. This is
      the primary analytical output of the pipeline — LLM-extracted fields
      with _est suffix are ready for aggregation and benchmarking queries.
    tags:
      - sqlite
      - structured
      - analytical
    customProperties:
      - property: tables
        value: "landlords, cases, issues, compensation_orders, legal_citations"
        description: The five tables exposed by this output port.
      - property: rowCounts
        value: "cases: ~16,611 | issues: ~42,416 | compensation_orders: ~33,708 | legal_citations: ~35,412 | landlords: ~723"
        description: Approximate row counts as of contract creation date.
      - property: filePath
        value: ombudsman_insights.db
        description: Relative path to the SQLite database from the repository root.
      - property: compressedArchive
        value: ombudsman_insights.zip
        description: >
          Versioned ZIP archive of the insights database, committed to the
          repository for reproducibility. Regenerated on each full pipeline
          run.

  - name: ombudsman-decisions-sqlite
    version: "1.0.0"
    type: tables
    description: >
      Raw SQLite database (ombudsman_decisions.db) containing a single
      'decisions' table with the full scraped text of each published Ombudsman
      decision. This is the upstream input to the LLM extraction pipeline and
      the authoritative source for all _est columns in the insights database.
    tags:
      - sqlite
      - raw
      - source-of-truth
    customProperties:
      - property: tables
        value: decisions
        description: Single table containing id, url, title, decision_date, landlord, full_text.
      - property: filePath
        value: ombudsman_decisions.db
        description: Relative path to the SQLite database from the repository root.
      - property: compressedArchive
        value: ombudsman_decisions.zip
        description: >
          Versioned ZIP archive of the raw decisions database, committed to
          the repository for reproducibility.

