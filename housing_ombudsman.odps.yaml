customProperties:
  - property: jurisdiction
    value: England
    description: >
      The Housing Ombudsman's statutory jurisdiction covers registered social
      landlords (RSLs) and local authorities managing social housing stock in
      England only.

  - property: dataClassification
    value: public
    description: >
      All decision text is published openly by the Housing Ombudsman Service.
      No personal data beyond what appears in the published decisions is
      stored. Residents are anonymised in published decisions.

  - property: extractionMethod
    value: LLM-assisted parsing
    description: >
      The pipeline applies a large language model to each decision's full_text
      to extract structured fields. All LLM-derived fields carry an '_est'
      suffix in the schema. The ODCS data contract (contractId
      496f1c72-b8f3-4158-9090-3e1bef5e438e) includes SQL quality rules for
      validating extraction outputs.

  - property: pipelineEntryPoint
    value: build_insights_db.py
    description: >
      Python script that orchestrates the full extraction pipeline: reads
      ombudsman_decisions.db, applies LLM extraction, and writes
      ombudsman_insights.db.

  - property: license
    value: Apache 2.0
    description: Repository and data product are released under the Apache 2.0 license.
