name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Extract database archives
        run: |
          unzip -o ombudsman_decisions.zip
          unzip -o ombudsman_insights.zip
          unzip -o ombudsman_complaints_findings.zip

      - name: Run tests
        run: uv run python -m pytest
